name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install ${{ matrix.python }}

      - name: Install workspace deps
        run: uv sync --frozen

      - name: Full pytest (3.11 only)
        if: matrix.python == '3.11'
        run: uv run pytest -q

      - name: Dogfood smoke (env -i isolated)
        run: |
          uv venv /tmp/dogfood-venv-${{ matrix.python }} --python ${{ matrix.python }}
          source /tmp/dogfood-venv-${{ matrix.python }}/bin/activate
          # T46 deviation: spec yml의 "[ocr] 3.11만" 분기 제거. ocr extras는
          # jsonschema + Pillow (pure Python) 만으로 충분 — mlx_vlm는 subprocess
          # 로 호출되어 import 시점 의존성 아님. 3.12/3.13 에서도 import smoke
          # 가능. CI 분기 단순화 + 매트릭스 일관성.
          uv pip install './packages/flowcoder-office-tools[ocr,messaging,docgen,ai]'
          uv pip install ./tests/dogfood
          # env -i — secret env 격리 (R1-C2 + R2-H6)
          env -i PATH="$PATH" PYTHONPATH="" python -m dogfood_smoke

      - name: ruff (3.11 only)
        if: matrix.python == '3.11'
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: mypy --strict (3.11 only)
        if: matrix.python == '3.11'
        run: |
          # T47: web/ Streamlit MVP entry — spec yml 의 mypy scope 복원
          # (T46 deviation 4 정합화).
          uv run mypy --strict packages/flowcoder-office-tools/src/ runner.py cases/ web/
